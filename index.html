  function render(){
    body = document.getElementById("drawerBody");
    body.innerHTML = ({ appearance:appearancePanel, background:backgroundPanel, widgets:widgetsPanel, data:dataPanel })[current]();
    ({ appearance:wireAppearance, background:wireBackground, widgets:wireWidgets, data:wireData })[current]();

  /* ---------- APPEARANCE ---------- */
  function appearancePanel(){

      </div>
      <div class="toggle-row"><span class="t-name">${I18N.t("suggestions")}</span><button class="switch ${s.suggest?'on':''}" data-suggest></button></div>
      <div class="field"><label>${I18N.t("glassBlur")} · ${s.glassBlur}px</label><input type="range" class="slider" min="0" max="40" value="${s.glassBlur}" data-blur></div>
      <div class="field"><label>${I18N.t("cardOpacity")} · ${Math.round(s.cardAlpha*100)}%</label><input type="range" class="slider" min="30" max="100" value="${s.cardAlpha*100}" data-alpha></div>

  function chipBg(t){
    const m={aurora:"radial-gradient(120% 120% at 15% 0%,#1a1b3a,#0a0a18)",light:"#eef1ff",dark:"#161a24",amoled:"#000",
      glass:"linear-gradient(135deg,#3a2b6e,#2b8a9c)",cyber:"radial-gradient(120% 120% at 80% 0%,#2a0040,#06000c)",
      midnight:"radial-gradient(120% 120% at 25% 0%,#10224d,#050a1c)",vision:"radial-gradient(130% 130% at 50% -10%,#34384a,#15171f)",
      minimal:"#f3f3f3",luxury:"linear-gradient(135deg,#241c0e,#0a0805)"};
    return m[t]||"#222";
  }
  function wireAppearance(){
    q("[data-theme-pick]",true).forEach(b=>b.onclick=()=>{Store.set({theme:b.dataset.themePick});render();});
    q("[data-accent]",true).forEach(b=>b.onclick=()=>{Store.set({accent:b.dataset.accent});render();});

    q("[data-radius]").oninput=e=>{Store.set({radiusScale:+e.target.value/100});liveLabel(e,"%",true);};
  }
  function liveLabel(e,unit,pct){ const v=pct?e.target.value:e.target.value; e.target.previousElementSibling.textContent=e.target.previousElementSibling.textContent.replace(/·.*/,"· "+(unit==="%"?Math.round(v):v)+unit); }

  function wireBackground(){
    q("[data-bgmode]",true).forEach(b=>b.onclick=()=>{Store.update(s=>s.background.mode=b.dataset.bgmode);render();});
    q("[data-grad]",true).forEach(b=>b.onclick=()=>{Store.update(s=>{s.background.gradient=+b.dataset.grad;s.background.mode="gradient";s.background.daily=false;});render();});
    q("[data-anim]",true).forEach(b=>b.onclick=()=>{Store.update(s=>{s.background.anim=b.dataset.anim;s.background.mode="animated";});render();});
    q("[data-daily]").onclick=e=>{Store.update(s=>s.background.daily=!s.background.daily);render();};
    q("[data-bgblur]").oninput=e=>{Store.update(s=>s.background.blur=+e.target.value);liveLabel(e,"px");};
    q("[data-bgbright]").oninput=e=>{Store.update(s=>s.background.bright=+e.target.value/100);liveLabel(e,"%",true);};
    q("[data-bgsat]").oninput=e=>{Store.update(s=>s.background.sat=+e.target.value/100);liveLabel(e,"%",true);};
    const file=q("#bgFile");
    q("#bgUpload").onclick=()=>file.click();
    file.onchange=()=>{
      const f=file.files[0]; if(!f)return;
      if(f.size>3.5*1024*1024){ UI.toast(I18N.lang==="ar"?"الصورة كبيرة (<3.5MB)":"Image too large (<3.5MB)"); return; }
      const r=new FileReader();
      r.onload=()=>{ Store.update(s=>{s.background.image=r.result;s.background.mode="image";}); render(); };
      r.readAsDataURL(f);
    };
  }

  /* ---------- WIDGETS ---------- */
  function widgetsPanel(){
    const w=Store.get().widgets;
    const labels={weather:"weather",prayer:"prayer",todo:"todo",notes:"notes",calendar:"calendar",pomodoro:"pomodoro",worldclock:"worldclock",crypto:"crypto",stocks:"stocks",calculator:"calculator"};
    return Object.keys(labels).map(k=>`
      <div class="toggle-row"><span class="t-name">${I18N.t(labels[k])}</span><button class="switch ${w[k]?'on':''}" data-widget="${k}"></button></div>`).join("");
  }
  function wireWidgets(){
    q("[data-widget]",true).forEach(b=>b.onclick=()=>{
      const k=b.dataset.widget;
      Store.update(s=>s.widgets[k]=!s.widgets[k]);
      b.classList.toggle("on"); Widgets.render();
    });
  }

  /* ---------- DATA ---------- */
  function dataPanel(){
    return `
      <p class="hint" style="margin-bottom:16px">${I18N.t("footHint")}.</p>
      <div class="data-actions">
        <button class="btn btn-soft" id="dataExport">⬇️ ${I18N.t("exportData")}</button>
        <button class="btn btn-soft" id="dataImport">⬆️ ${I18N.t("importData")}</button>
        <input type="file" id="dataFile" accept="application/json" hidden>
        <button class="btn btn-danger" id="dataReset">♻️ ${I18N.t("reset")}</button>
      </div>`;
  }
  function wireData(){
    q("#dataExport").onclick=()=>{
      const blob=new Blob([Store.export()],{type:"application/json"});
      const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="lumen-backup.json"; a.click();
    };
    const file=q("#dataFile");
    q("#dataImport").onclick=()=>file.click();
    file.onchange=()=>{ const f=file.files[0]; if(!f)return; const r=new FileReader();
      r.onload=()=>{ if(Store.import(r.result)){ UI.toast(I18N.t("imported")); App.refreshAll(); } else UI.toast(I18N.t("importFail")); };
      r.readAsText(f); };
    q("#dataReset").onclick=()=>{ if(confirm(I18N.t("deleteConfirm"))){ Store.reset(); App.refreshAll(); UI.closeDrawer(); } };
  }

  const q=(sel,all)=> all ? Array.from(body.querySelectorAll(sel)) : body.querySelector(sel);
  return { open, setTab, render };
})();

/* ===== js/app.js ===== */
/* ============================================================
   app.js — UI helpers, particles, init, wiring, PWA
   ============================================================ */
const UI = (() => {
  const drawer=()=>document.getElementById("drawer");
  const scrim=()=>document.getElementById("scrim");
  const mScrim=()=>document.getElementById("modalScrim");

  function openDrawer(){ drawer().classList.add("open"); scrim().classList.add("open"); drawer().setAttribute("aria-hidden","false"); }
  function closeDrawer(){ drawer().classList.remove("open"); scrim().classList.remove("open"); drawer().setAttribute("aria-hidden","true"); }
  function modal(title, html){
    document.getElementById("modalTitle").textContent=title;
    document.getElementById("modalBody").innerHTML=html;
    mScrim().classList.add("open");
    document.getElementById("modal").querySelectorAll("[data-close]").forEach(b=>b.onclick=closeModal);
    const first=document.getElementById("modalBody").querySelector("input"); if(first) setTimeout(()=>first.focus(),60);
  }
  function closeModal(){ mScrim().classList.remove("open"); }
  let toastTo;
  function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastTo); toastTo=setTimeout(()=>t.classList.remove("show"),2200); }
  return { openDrawer, closeDrawer, modal, closeModal, toast };
})();

/* ---------------- particles ---------------- */
const Particles = (() => {
  let cv, ctx, parts=[], raf, W, H, mouse={x:-999,y:-999};
  function resize(){ W=cv.width=innerWidth*devicePixelRatio; H=cv.height=innerHeight*devicePixelRatio; cv.style.width=innerWidth+"px"; cv.style.height=innerHeight+"px"; }
  function init(){
    cv=document.getElementById("particles"); ctx=cv.getContext("2d"); resize();
    const count=Math.min(70, Math.floor(innerWidth/22));
    parts=Array.from({length:count},()=>({ x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-.5)*.25*devicePixelRatio, vy:(Math.random()-.5)*.25*devicePixelRatio, r:(Math.random()*1.6+.4)*devicePixelRatio }));
    addEventListener("resize",resize);
    addEventListener("pointermove",e=>{ mouse.x=e.clientX*devicePixelRatio; mouse.y=e.clientY*devicePixelRatio; });
    loop();
  }
  function loop(){
    if (matchMedia("(prefers-reduced-motion:reduce)").matches){ return; }
    ctx.clearRect(0,0,W,H);
    const accent=getComputedStyle(document.body).getPropertyValue("--accent").trim()||"#7c9cff";
    for(const p of parts){
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1; if(p.y<0||p.y>H)p.vy*=-1;
      const dx=p.x-mouse.x, dy=p.y-mouse.y, d=Math.hypot(dx,dy);
      if(d<120*devicePixelRatio){ p.x+=dx/d*.6; p.y+=dy/d*.6; }
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fillStyle=accent; ctx.globalAlpha=.5; ctx.fill();
    }
    // links
    ctx.globalAlpha=.12; ctx.strokeStyle=accent; ctx.lineWidth=devicePixelRatio;
    for(let i=0;i<parts.length;i++)for(let j=i+1;j<parts.length;j++){
      const a=parts[i],b=parts[j],dd=Math.hypot(a.x-b.x,a.y-b.y);
      if(dd<110*devicePixelRatio){ ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
    }
    ctx.globalAlpha=1;
    raf=requestAnimationFrame(loop);
  }
  return { init };
})();

/* ---------------- mouse glow + parallax ---------------- */
const Glow = (() => {
  function init(){
    if (matchMedia("(prefers-reduced-motion:reduce)").matches) return;
    const glow=document.getElementById("bgGlow");
    const orbs=[...document.querySelectorAll(".bg-orb")];
    let raf, tx=innerWidth/2, ty=innerHeight/2, cx=tx, cy=ty;
    addEventListener("pointermove", e=>{
      tx=e.clientX; ty=e.clientY; glow.style.opacity=".8";
      const ox=(e.clientX/innerWidth-.5), oy=(e.clientY/innerHeight-.5);
      orbs.forEach((o,i)=>{ const m=(i+1)*14; o.style.transform=`translate(${ox*m}px,${oy*m}px)`; });
    }, {passive:true});
    addEventListener("pointerleave", ()=>glow.style.opacity="0");
    (function follow(){
      cx+=(tx-cx)*.12; cy+=(ty-cy)*.12;
      glow.style.left=cx+"px"; glow.style.top=cy+"px";
      raf=requestAnimationFrame(follow);
    })();
  }
  return { init };
})();

/* ---------------- App ---------------- */
const App = (() => {
  function applyState(s){
    Themes.applyAll(s);
    const meta=document.querySelector('meta[name="theme-color"]');
    if(meta) meta.setAttribute("content", getComputedStyle(document.body).getPropertyValue("--bg").trim());
  }

  function refreshAll(){
    const s=Store.get();
    I18N.apply(s.lang);
    applyState(s);
    Clock.refresh();
    Search.render();
    Bookmarks.renderAll();
    Widgets.render();
    Settings.render();
  }

  function init(){
    const s=Store.get();
    I18N.apply(s.lang);
    applyState(s);

    Clock.start();
    Particles.init();
    Glow.init();
    Search.render();
    Search.initHotkeys();
    Bookmarks.renderAll();
    Widgets.render();

    // live re-apply theme/vars/background whenever state changes
    Store.subscribe(applyState);

    wire();

    // boot fade
    setTimeout(()=>document.getElementById("boot").classList.add("gone"),520);

    // PWA
    if(false /* single-file: SW disabled */ && "serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
  }

  function wire(){
    document.getElementById("openSettings").onclick=()=>Settings.open();
    document.getElementById("closeSettings").onclick=UI.closeDrawer;
    document.getElementById("scrim").onclick=UI.closeDrawer;
    document.getElementById("modalScrim").onclick=e=>{ if(e.target.id==="modalScrim") UI.closeModal(); };
    document.getElementById("modalClose").onclick=UI.closeModal;
    document.getElementById("themeQuick").onclick=Themes.cycle;
    document.getElementById("viewToggle").onclick=Bookmarks.toggleView;
    document.getElementById("addEngine").onclick=()=>Search.openEngineModal(null);
    document.getElementById("addCategory").onclick=Bookmarks.addCategory;
    document.getElementById("langToggle").onclick=()=>{
      const next=Store.get().lang==="ar"?"en":"ar";
      Store.set({lang:next}); refreshAll();
    };
    document.querySelectorAll("#drawerTabs button").forEach(b=>b.onclick=()=>Settings.setTab(b.dataset.tab));
  }

  return { init, refreshAll };
})();

document.addEventListener("DOMContentLoaded", App.init);

  </script>
